            width: 90%;
            max-width: 400px;

            border: none;
            background-color: #007bff;
            color: white;
            border-radius: 5px;
            transition: background-color 0.3s;

            border-radius: 5px;

        .result-item span {
            font-size: 18px;
            font-weight: bold;
            color: #495057;
            flex-grow: 1;
            text-align: left;
            padding-left: 10px;
        }
        .copy-button {
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #ffffff;
            color: #007bff;
            border-radius: 4px;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .copy-button:hover {
            background-color: #e9ecef;

                buttonElement.textContent = '已复制!';
                buttonElement.classList.add('copied');
